<style>
  :root { --graph-dock-width: 480px; }

  #wiki-graph-fab {
    position: fixed; right: 18px; z-index: 900;
    bottom: calc(22px + env(safe-area-inset-bottom, 0px));
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 13px; border-radius: 999px;
    background: rgba(15,17,23,0.88); color: #cbd5e1;
    border: 1px solid rgba(145,212,120,0.32);
    font: 600 12px/1 Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: .02em; cursor: pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 6px 18px rgba(0,0,0,.28), 0 0 22px rgba(145,212,120,.08);
    transition: color .15s, border-color .15s, transform .15s, opacity .2s;
  }
  #wiki-graph-fab:hover { color: #f1f5f9; border-color: rgba(145,212,120,.6); transform: translateY(-1px); }
  #wiki-graph-fab .dot { width: 7px; height: 7px; border-radius: 50%; background: #91d478; box-shadow: 0 0 8px rgba(145,212,120,.7); }
  #wiki-graph-fab.is-hidden { opacity: 0; pointer-events: none; transform: scale(.9); }

  /* fixed 스테이지가 overflow를 클리핑 → off-screen 도크가 페이지 가로 스크롤을 만들지 않음.
     html/body에 overflow-x 손대지 않아 iOS의 position:fixed 깨짐 문제 회피. */
  #wiki-graph-stage {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 1100;
    width: var(--graph-dock-width);
    overflow: hidden;
    pointer-events: none;
  }

  #wiki-graph-dock {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    background: #0f1117;
    border-left: 1px solid #1e293b;
    box-shadow: -10px 0 30px rgba(0,0,0,.35);
    transform: translateX(100%);
    pointer-events: none;
    transition: transform .28s cubic-bezier(.2,.8,.2,1);
  }
  #wiki-graph-dock.is-open {
    transform: translateX(0);
    pointer-events: auto;
  }
  /* 드래그 중 슬라이드/패딩 애니메이션은 끔 → 즉시 반응, 끊김 없음 */
  body.wg-resizing #wiki-graph-dock,
  body.wg-resizing { transition: none !important; }
  body.wg-resizing { user-select: none; cursor: ew-resize; }
  /* 드래그 중 iframe이 포인터 이벤트 가로채지 않도록 */
  body.wg-resizing #wiki-graph-frame { pointer-events: none; }
  /* 페이지 진입 시 도크가 이미 열려있던 상태라면 슬라이드 애니메이션 없이 즉시 보임 */
  body.wg-no-anim,
  body.wg-no-anim #wiki-graph-dock,
  body.wg-no-anim #wiki-graph-fab { transition: none !important; }

  /* 왼쪽 가장자리 리사이즈 핸들 (모바일에선 숨김) */
  #wiki-graph-resize {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 6px; cursor: ew-resize; z-index: 10;
    background: transparent;
    transition: background .15s;
  }
  #wiki-graph-resize::before {
    content: ''; position: absolute; top: 50%; left: 2px;
    width: 2px; height: 32px; border-radius: 2px;
    background: rgba(148,163,184,0.18);
    transform: translateY(-50%);
    transition: background .15s;
  }
  #wiki-graph-resize:hover { background: rgba(145,212,120,0.10); }
  #wiki-graph-resize:hover::before, body.wg-resizing #wiki-graph-resize::before {
    background: rgba(145,212,120,0.7);
  }

  #wiki-graph-dock header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid #1e293b;
    background: rgba(15,17,23,0.94);
    color: #cbd5e1;
    font: 600 12px/1 Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: .04em;
    flex-shrink: 0;
  }
  #wiki-graph-dock .wg-title { display: flex; align-items: center; gap: 8px; }
  #wiki-graph-dock .wg-title::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: #91d478; box-shadow: 0 0 8px rgba(145,212,120,.7);
  }
  #wiki-graph-dock .wg-close {
    background: transparent; border: 0; color: #64748b;
    cursor: pointer; padding: 4px 9px; border-radius: 4px;
    font: inherit;
    transition: color .15s, background .15s;
  }
  #wiki-graph-dock .wg-close:hover { color: #f1f5f9; background: rgba(255,255,255,.05); }

  #wiki-graph-frame {
    flex: 1; width: 100%; border: 0; background: #0f1117;
  }

  /* 페이지 반응형: 도크가 열리면 본문이 도크 너비만큼 좁아짐 */
  body { transition: padding-right .28s cubic-bezier(.2,.8,.2,1); }
  body.wg-dock-open { padding-right: var(--graph-dock-width); }

  @media (max-width: 720px) {
    #wiki-graph-stage { width: 100vw; }
    #wiki-graph-resize { display: none; }
    /* 모바일에선 도크가 풀폭으로 본문 위를 덮으므로 body 패딩 조정 안 함 */
    body.wg-dock-open { padding-right: 0; }
  }
</style>

<button id="wiki-graph-fab" type="button" aria-label="지식 그래프 열기">
  <span class="dot"></span> 그래프
</button>

<div id="wiki-graph-stage">
  <aside id="wiki-graph-dock" role="complementary" aria-label="지식 그래프" aria-hidden="true">
    <div id="wiki-graph-resize" role="separator" aria-orientation="vertical" aria-label="도크 너비 조정" tabindex="0"></div>
    <header>
      <span class="wg-title">Knowledge Graph</span>
      <button class="wg-close" type="button" aria-label="닫기">✕</button>
    </header>
    <iframe id="wiki-graph-frame" title="Knowledge Graph" loading="lazy"></iframe>
  </aside>
</div>

<script>
  (function () {
    const fab    = document.getElementById('wiki-graph-fab');
    const dock   = document.getElementById('wiki-graph-dock');
    const closeB = dock.querySelector('.wg-close');
    const handle = document.getElementById('wiki-graph-resize');
    const frame  = document.getElementById('wiki-graph-frame');
    const root   = document.documentElement;
    const body   = document.body;
    // 페이지 로드마다 cache-busting 파라미터를 붙여 iframe이 항상 최신 /graph/ 가져오게 함
    const src    = '/graph/?embed=1&focus=' + encodeURIComponent({{ page.url | jsonify }}) + '&_=' + Date.now();
    let loaded   = false;

    const MIN = 320;
    const STORAGE_KEY = 'wikiGraphDockWidth';
    const OPEN_KEY = 'wikiGraphDockOpen';
    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
    const maxW = () => Math.min(800, window.innerWidth - 280);

    function setWidth(w) {
      const px = clamp(w, MIN, maxW());
      root.style.setProperty('--graph-dock-width', px + 'px');
      return px;
    }

    // 저장된 너비 복원
    const stored = parseInt(localStorage.getItem(STORAGE_KEY), 10);
    if (!isNaN(stored)) setWidth(stored);

    function open() {
      if (!loaded) { frame.src = src; loaded = true; }
      dock.classList.add('is-open');
      dock.setAttribute('aria-hidden', 'false');
      fab.classList.add('is-hidden');
      if (window.innerWidth > 720) body.classList.add('wg-dock-open');
      try { sessionStorage.setItem(OPEN_KEY, '1'); } catch (e) {}
    }
    function close() {
      dock.classList.remove('is-open');
      dock.setAttribute('aria-hidden', 'true');
      fab.classList.remove('is-hidden');
      body.classList.remove('wg-dock-open');
      try { sessionStorage.removeItem(OPEN_KEY); } catch (e) {}
    }

    // 이전 페이지에서 도크가 열려있었다면 페이지 이동 후에도 같은 상태로 즉시 복원.
    // 슬라이드 애니메이션을 한 번만 끄고 두 RAF 후 다시 켜서, 이후 닫기/열기 트랜지션은 정상 동작.
    try {
      if (sessionStorage.getItem(OPEN_KEY) === '1') {
        body.classList.add('wg-no-anim');
        open();
        requestAnimationFrame(() => requestAnimationFrame(() => body.classList.remove('wg-no-anim')));
      }
    } catch (e) {}

    fab.addEventListener('click', open);
    closeB.addEventListener('click', close);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && dock.classList.contains('is-open')) close();
    });

    // 화면 회전/리사이즈 시 모바일 ↔ 데스크탑 전환 동기화
    window.addEventListener('resize', () => {
      if (!dock.classList.contains('is-open')) return;
      if (window.innerWidth <= 720) body.classList.remove('wg-dock-open');
      else body.classList.add('wg-dock-open');
    });

    // ── 드래그 리사이즈 ─────────────────────────
    handle.addEventListener('pointerdown', e => {
      if (window.innerWidth <= 720) return;  // 모바일은 풀폭 고정
      e.preventDefault();
      handle.setPointerCapture(e.pointerId);
      body.classList.add('wg-resizing');

      const onMove = ev => {
        setWidth(window.innerWidth - ev.clientX);
      };
      const onUp = ev => {
        handle.releasePointerCapture(ev.pointerId);
        handle.removeEventListener('pointermove', onMove);
        handle.removeEventListener('pointerup', onUp);
        handle.removeEventListener('pointercancel', onUp);
        body.classList.remove('wg-resizing');
        const px = parseInt(getComputedStyle(root).getPropertyValue('--graph-dock-width'), 10);
        if (!isNaN(px)) localStorage.setItem(STORAGE_KEY, String(px));
      };
      handle.addEventListener('pointermove', onMove);
      handle.addEventListener('pointerup', onUp);
      handle.addEventListener('pointercancel', onUp);
    });

    // 키보드로도 너비 조정 (← / →, 10px씩)
    handle.addEventListener('keydown', e => {
      if (window.innerWidth <= 720) return;
      const cur = parseInt(getComputedStyle(root).getPropertyValue('--graph-dock-width'), 10) || 480;
      if (e.key === 'ArrowLeft')  { e.preventDefault(); const w = setWidth(cur + 20); localStorage.setItem(STORAGE_KEY, String(w)); }
      if (e.key === 'ArrowRight') { e.preventDefault(); const w = setWidth(cur - 20); localStorage.setItem(STORAGE_KEY, String(w)); }
    });
  })();
</script>
