<style>
  #wiki-graph-fab {
    position: fixed; right: 18px; z-index: 900;
    bottom: calc(22px + env(safe-area-inset-bottom, 0px));
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 13px; border-radius: 999px;
    background: rgba(15,17,23,0.88); color: #cbd5e1;
    border: 1px solid rgba(145,212,120,0.32);
    font: 600 12px/1 Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: .02em; cursor: pointer;
    backdrop-filter: blur(8px);
    box-shadow: 0 6px 18px rgba(0,0,0,.28), 0 0 22px rgba(145,212,120,.08);
    transition: color .15s, border-color .15s, transform .15s, opacity .2s;
  }
  #wiki-graph-fab:hover { color: #f1f5f9; border-color: rgba(145,212,120,.6); transform: translateY(-1px); }
  #wiki-graph-fab .dot { width: 7px; height: 7px; border-radius: 50%; background: #91d478; box-shadow: 0 0 8px rgba(145,212,120,.7); }
  #wiki-graph-fab.is-hidden { opacity: 0; pointer-events: none; transform: scale(.9); }

  /* fixed 스테이지가 overflow를 클리핑 → off-screen 도크가 페이지 가로 스크롤을 만들지 않음.
     html/body에 overflow-x 손대지 않아 iOS의 position:fixed 깨짐 문제 회피. */
  #wiki-graph-stage {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 1100;
    width: min(480px, 45vw);
    overflow: hidden;
    pointer-events: none;
  }

  #wiki-graph-dock {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    background: #0f1117;
    border-left: 1px solid #1e293b;
    box-shadow: -10px 0 30px rgba(0,0,0,.35);
    transform: translateX(100%);
    pointer-events: none;
    transition: transform .28s cubic-bezier(.2,.8,.2,1);
  }
  #wiki-graph-dock.is-open {
    transform: translateX(0);
    pointer-events: auto;
  }

  #wiki-graph-dock header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid #1e293b;
    background: rgba(15,17,23,0.94);
    color: #cbd5e1;
    font: 600 12px/1 Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    letter-spacing: .04em;
    flex-shrink: 0;
  }
  #wiki-graph-dock .wg-title { display: flex; align-items: center; gap: 8px; }
  #wiki-graph-dock .wg-title::before {
    content: ''; width: 7px; height: 7px; border-radius: 50%;
    background: #91d478; box-shadow: 0 0 8px rgba(145,212,120,.7);
  }
  #wiki-graph-dock .wg-close {
    background: transparent; border: 0; color: #64748b;
    cursor: pointer; padding: 4px 9px; border-radius: 4px;
    font: inherit;
    transition: color .15s, background .15s;
  }
  #wiki-graph-dock .wg-close:hover { color: #f1f5f9; background: rgba(255,255,255,.05); }

  #wiki-graph-frame {
    flex: 1; width: 100%; border: 0; background: #0f1117;
  }

  @media (max-width: 720px) {
    #wiki-graph-stage { width: 100vw; }
  }
</style>

<button id="wiki-graph-fab" type="button" aria-label="지식 그래프 열기">
  <span class="dot"></span> 그래프
</button>

<div id="wiki-graph-stage">
  <aside id="wiki-graph-dock" role="complementary" aria-label="지식 그래프" aria-hidden="true">
    <header>
      <span class="wg-title">Knowledge Graph</span>
      <button class="wg-close" type="button" aria-label="닫기">✕</button>
    </header>
    <iframe id="wiki-graph-frame" title="Knowledge Graph" loading="lazy"></iframe>
  </aside>
</div>

<script>
  (function () {
    const fab    = document.getElementById('wiki-graph-fab');
    const dock   = document.getElementById('wiki-graph-dock');
    const closeB = dock.querySelector('.wg-close');
    const frame  = document.getElementById('wiki-graph-frame');
    const src    = '/graph/?embed=1&focus=' + encodeURIComponent({{ page.url | jsonify }});
    let loaded   = false;

    function open() {
      if (!loaded) { frame.src = src; loaded = true; }
      dock.classList.add('is-open');
      dock.setAttribute('aria-hidden', 'false');
      fab.classList.add('is-hidden');
    }
    function close() {
      dock.classList.remove('is-open');
      dock.setAttribute('aria-hidden', 'true');
      fab.classList.remove('is-hidden');
    }

    fab.addEventListener('click', open);
    closeB.addEventListener('click', close);
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && dock.classList.contains('is-open')) close();
    });
  })();
</script>
