---
layout: document
---

<div class="post">
    <header class="post-header">
        <p class="book-back-link"><a href="/books/">← 서재로</a></p>
        <h1 class="page-title">{{ page.title }}</h1>
        <p class="title-summary">{{ page.author }}</p>
        <div class="book-detail-tags">
            <span class="book-tag book-tag--type">{{ page.type }}</span>
            <span class="book-tag book-tag--status book-tag--{{ page.status }}">
                {% if page.status == 'finished' %}완독
                {% elsif page.status == 'reading' %}읽는 중
                {% else %}읽을 예정{% endif %}
            </span>
            {% if page.end_date %}
            <span class="book-tag book-tag--date">{{ page.end_date }}</span>
            {% endif %}
        </div>
        <div class="history-button">
            <p><a href="https://github.com/currenjin/currenjin.github.io/edit/main/_books/{{ page.slug }}.md">편집하기</a></p>
        </div>
    </header>
    <article class="post-content">
        {{ content }}
    </article>
</div>
