name: Sync Medium Posts

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-medium:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Medium posts
        run: node scripts/sync-medium-posts.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- data/medium.json; then
            echo "No changes in data/medium.json"
            exit 0
          fi
          git add data/medium.json
          git commit -m "chore: sync medium posts"
          git push
