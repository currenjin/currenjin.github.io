# Build settings
plugins:
  - jekyll-gist

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  # https://kramdown.gettalong.org/rdoc/Kramdown/Options.html - smart_quotes
  smart_quotes: ["apos", "apos", "quot", "quot"]

# Collections
collections:
    wiki:
        output: true
        permalink: /:collection/:path/
    books:
        output: true
        permalink: /books/:path/

# Comment Service
disqus:
  id: currenjin
  shortname: currenjin
utterances:
  repo: currenjin/currenjin.github.io
  issue-term: url
  label: Comment
  branch: main

google_analytics:
